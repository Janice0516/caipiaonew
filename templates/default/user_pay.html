<script>
function copyAddress() {
    const input = document.getElementById('usdtAddressInput');
    input.select();
    input.setSelectionRange(0, 99999); // 移动端兼容
    
    try {
        const successful = document.execCommand('copy');
        const button = event.currentTarget;
        const originalText = button.textContent;
        
        if (successful) {
            button.textContent = '已复制';
            button.style.background = '#b8941f';
            
            setTimeout(() => {
                button.textContent = originalText;
                button.style.background = '#d4af37';
            }, 2000);
        }
    } catch (err) {
        alert('复制失败，请手动选择地址复制');
    }
}
</script>

<script type="text/javascript">

function set_hv(){
    var lv = $("#type1 option:selected").attr('data-lv');
    $("#hv").html("1:"+lv);
}

$(function(){
    $("#hv").html("1:"+$("#type1 option").eq(0).attr('data-lv'));
    
	var Vform = $("#send_form").Validform();
	Vform.config({
		tiptype:1,
		ajaxPost:true,
		callback:function(data){
			if(data.status == 'y'){
			
			if(data.xuanze == '2'){
				Vform.resetForm();//初始化表单
				setTimeout(function(){//2秒后刷新
					location.href = '/ddpay/pay.php?payid='+data.payid+'&money='+data.money+'&type='+data.type;
				}, 2000);
			}else{
			Vform.resetForm();//初始化表单
				setTimeout(function(){//2秒后刷新
					location.href = '?a=pay_list';
				}, 2000);
			
			}
						
			}
		}
	});
	Vform.addRule([
		{
			ele:'#money',
			datatype:'rmb2',
			nullmsg:'<?php echo _lang('请输入金额')?>！',
			errormsg:'<?php echo _lang('请输入正确的货币格式')?>！'
		},
		{
			ele:'#comment',
			datatype:'s1-50',
			ignore:'ignore',
			nullmsg:'<?php echo _lang('请输入备注内容')?>！',
			errormsg:'<?php echo _lang('备注内容最多50字')?>！'
		},
	]);
	//自动调整窗口
	$(window).resize(function() {
		var h = $(window).height()/1.5;
		$('.scroll_box').css({'height':h+55});
	}).resize();
	//二维码切换
	$('.btn a').click(function() {
		$(this).addClass('a').siblings().removeClass('a');
		$('.ewm li').eq($(this).index()).addClass('a').siblings().removeClass('a');
	});
});
