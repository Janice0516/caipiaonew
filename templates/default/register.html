    <script type="text/javascript" src="<?php echo JS_PATH?>Validform_v5.3.2.js"></script>
    <script type="text/javascript">
    $(function(){
        var Vform = $("#reg_form").Validform({
            tiptype: function(msg, o, cssctl) {
                if (o.type == 3) {
                    layer.msg(msg, {icon: 5, time: 2000});
                }
            },
            ajaxPost: true,
            callback: function(data) {
                if (data.status == 'y') {
                    layer.msg('注册成功！正在跳转...', {icon: 6});
                    setTimeout(function(){
                        location.href = '?a=login';
                    }, 2000);
                } else {
                    layer.msg(data.info, {icon: 5});
                    $('#code_img').click(); // Refresh captcha
                }
            }
        });

        Vform.addRule([
            {
                ele: '#username',
                datatype: USERNAME_TYPE,
                ajaxurl: INDEX_PATH + 'a=ajax_username',
                nullmsg: '<?php echo _lang("请输入用户名！")?>',
                errormsg: '<?php echo _lang("用户名格式错误！")?>'
            },
            {
                ele: '#password',
                datatype: 's6-20',
                nullmsg: '<?php echo _lang("请输入密码！")?>',
                errormsg: '<?php echo _lang("密码长度6-20位！")?>'
            },
            {
                ele: '#name',
                datatype: 's2-5',
                nullmsg: '<?php echo _lang("请输入真实的姓名！")?>',
                errormsg: '<?php echo _lang("姓名应该为2-5个字！")?>'
            }
        ]);
    });
    </script>
